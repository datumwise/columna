# Root pytest config — quality-of-life for a bare `pytest` from the repo root.
#
# A newcomer's first act is often `pytest` at the repo root, which discovers BOTH packages in ONE
# invocation. In that combined run the rootdir rises above each package's own pyproject.toml, so the
# server package's `asyncio_mode = auto` (in packages/columna-server/pyproject.toml) is not applied
# and its ~19 async tests fail to collect. This root config restores `asyncio_mode = auto` for that
# combined-root case so the first `pytest` is green.
#
# CI is UNCHANGED: it runs the suites SEPARATELY — `pytest packages/columna-core` and
# `pytest packages/columna-server` — and each resolves to its OWN [tool.pytest.ini_options] first
# (both packages define one), so this higher-up file is never their configfile. Per-package configs
# are untouched.
[pytest]
asyncio_mode = auto
