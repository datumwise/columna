name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/columna-core
          # columna-core is a local (not-yet-published) dependency, so install the server without
          # re-resolving it, and add its runtime + test deps explicitly.
          pip install "mcp>=1.0" "tomli>=2.0; python_version < '3.11'"
          pip install --no-deps -e packages/columna-server
          pip install pytest ruff pytest-asyncio

      # Bare invocations: exit codes count (no pipe through tail/head).
      - name: Ruff (correctness only — F, E9)
        run: |
          ruff check packages/columna-core/src packages/columna-core/demos packages/columna-core/tests
          ruff check packages/columna-server/src packages/columna-server/tests

      # COLUMNA_BENCH_WAREHOUSE is intentionally unset, so the 20 @pytest.mark.warehouse proofs are
      # skipped: columna-core collects 124 / runs 104 / skips 20.
      - name: Pytest — columna-core (fixture-backed; warehouse proofs skipped)
        run: pytest packages/columna-core -q

      - name: Pytest — columna-server (MCP stdio acceptance + packaged demo)
        run: pytest packages/columna-server -q

      # One cheap regression over the whole wedge path: the demo prints all four moods in order.
      # Post-§2c the tour is clarify -> refuse -> disclose -> serve; disclose is driven by
      # `level.sum @ store*cal.month` (a stock summed across the blocked day->month axis — a material
      # b_anchor_crossing caveat), the well-posed replacement for the retired cross-universe wedge.
      - name: Demo smoke (demo --play, four moods in order)
        run: |
          columna-server demo --play | python -c "import sys; s=sys.stdin.read(); \
          i=[s.find('\"outcome\": \"%s\"' % m) for m in ('clarify','refuse','disclose','serve')]; \
          assert -1 not in i and i == sorted(i), i; \
          assert '\"contract_version\": \"1\"' in s; print('demo --play smoke OK:', i)"

  # Item (c): prove the packaged demo runs from a clean-venv WHEEL install on Python 3.10 — the
  # weakest case (importlib.resources directory traversal for zipped resources is 3.12+; pip installs
  # unzipped so 3.10 works, and this job proves it). This is the package-data-ships acceptance.
  demo-wheel-py310:
    name: demo wheel install (py3.10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build wheels and install into a clean venv
        run: |
          python -m pip install --upgrade pip build
          python -m build packages/columna-core
          python -m build packages/columna-server
          python -m venv /tmp/demoenv
          /tmp/demoenv/bin/pip install packages/columna-core/dist/*.whl packages/columna-server/dist/*.whl
      - name: demo --play from the installed wheel (package-data proof)
        run: |
          /tmp/demoenv/bin/columna-server demo --play | /tmp/demoenv/bin/python -c "import sys; \
          s=sys.stdin.read(); i=[s.find('\"outcome\": \"%s\"' % m) for m in ('clarify','refuse','disclose','serve')]; \
          assert -1 not in i and i == sorted(i), i; assert '\"contract_version\": \"1\"' in s; \
          print('py3.10 wheel demo --play OK')"

  build:
    name: build wheels + sdists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build packages/columna-core
          python -m build packages/columna-server
      - name: Show artifacts
        run: ls -l packages/columna-core/dist packages/columna-server/dist
      # Install the core wheel into a FRESH venv (only its declared deps) and RUN a real fetch — this
      # is what catches an undeclared hard runtime dep (e.g. pyarrow) that an import-only check misses.
      - name: Wheel smoke (clean venv, real fetch)
        run: |
          python -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install packages/columna-core/dist/*.whl
          /tmp/wheelenv/bin/python packages/columna-core/tests/smoke_wheel.py
      - uses: actions/upload-artifact@v4
        with:
          name: columna-dists
          path: |
            packages/columna-core/dist/*
            packages/columna-server/dist/*
