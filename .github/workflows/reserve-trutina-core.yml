name: reserve-trutina-core

# One-shot PyPI name reservation for datumwise — the honest placeholder package `trutina-core`
# (v0.0.0, "name reserved… not yet released; no functionality"). workflow_dispatch ONLY; OIDC via PyPI
# Trusted Publishers (no tokens). Trusted Publisher to register:
#   PyPI project: trutina-core · owner: datumwise · repo: columna · workflow: reserve-trutina-core.yml · environment: (none)
#
# Separate from reserve-placeholders.yml (which publishes `trutina`) because PyPI forbids two PENDING
# trusted publishers sharing an identical (repo, workflow, environment) config — each name needs a
# distinct workflow file until it exists as a real project.
on:
  workflow_dispatch:

jobs:
  reserve:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # OIDC token for Trusted Publishing — this job only; no secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the placeholder dist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build reserve/trutina-core --outdir dist
          twine check dist/*
      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
