name: docs

# The manual's integrity rule (ADR-035 D4): every executable Frame-QL example is regenerated BY
# EXECUTION against the shipped package; an example that stops parsing, errors, or whose committed
# output drifts fails this build. Separate from the website workflow — publishing docs/ does NOT
# trigger a site deploy (website.yml filters on apps/website/** only).
on:
  push:
    branches: [main, wp-manuals-alignment]
    paths: ['docs/**', '.github/workflows/docs.yml']
  pull_request:
    paths: ['docs/**', '.github/workflows/docs.yml']

jobs:
  regen-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install the shipped packages
        run: |
          python -m pip install -U pip
          pip install ./packages/columna-core ./packages/columna-server
      - name: Regenerate Frame-QL examples by execution (check mode)
        run: python docs/tools/regen_examples.py --check
