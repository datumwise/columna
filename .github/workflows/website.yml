name: website

# The integrity rule, enforced in CI: the recorded transcript is generated by running the SHIPPED
# (installed-from-PyPI) package. If generation fails, the build fails — the site is structurally
# incapable of shipping a transcript it did not generate from the real package.
on:
  push:
    branches: [main, wp5.1-website]
    paths: ['apps/website/**', '.github/workflows/website.yml']
  pull_request:
    paths: ['apps/website/**']

defaults:
  run:
    working-directory: apps/website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/website/package-lock.json

      - name: Install the shipped package from PyPI (pinned)
        run: pip install "columna-core==0.7.8" "columna-server==0.1.0"

      - name: Generate the integrity transcript from the shipped package (fails closed)
        run: |
          mkdir -p src/data
          python scripts/gen_transcript.py > src/data/transcript.generated.json
          echo "transcript bytes: $(wc -c < src/data/transcript.generated.json)"

      - name: Install site dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Deploy is opt-in: runs on main only, and only if the Vercel secrets are configured on the
      # repo (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID). Otherwise this is a build+gate check.
      - name: Deploy to Vercel (production, prebuilt)
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
