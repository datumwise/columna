name: website

# The site build is SPLIT (Huayin ruling, 2026-07-17):
#   • branch-coherent (PR + branch pushes): the transcript is generated from the BRANCH packages
#     (editable), so a PR verifies the site against the code it rides with — this gate goes green when
#     the branch is internally coherent, even before a release.
#   • shipped-coherent (deploy, main only): the transcript is generated from the SHIPPED (PyPI-pinned)
#     package, and only this job deploys. The deploy-wedge's guarantee lives WHOLLY here — the site is
#     structurally incapable of deploying a transcript it did not generate from the real shipped package.
on:
  push:
    branches: [main, wp5.1-website, wp-cp3]
    paths: ['apps/website/**', '.github/workflows/website.yml', 'packages/**', 'docs/**']
  pull_request:
    paths: ['apps/website/**', '.github/workflows/website.yml', 'packages/**', 'docs/**']

defaults:
  run:
    working-directory: apps/website

jobs:
  branch-coherent:
    name: site build (branch-coherent, PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/website/package-lock.json

      - name: Install the BRANCH packages (editable) — branch-coherent
        run: |
          pip install -e ../../packages/columna-core
          pip install "mcp>=1.0" "tomli>=2.0; python_version < '3.11'"
          pip install --no-deps -e ../../packages/columna-server

      - name: Generate the integrity transcript from the BRANCH package (fails closed)
        run: |
          mkdir -p src/data
          python scripts/gen_transcript.py > src/data/transcript.generated.json
          echo "transcript bytes: $(wc -c < src/data/transcript.generated.json)"

      - name: Generate the /case seeds from the BRANCH package (fails closed on exemplar drift)
        run: |
          python scripts/gen_case.py > src/data/case.generated.json
          echo "case bytes: $(wc -c < src/data/case.generated.json)"

      - name: Generate the Universe Visual (Figure 1) from the BRANCH package (fails closed)
        run: |
          python scripts/gen_universe_visual.py > src/data/universe_visual.generated.json
          echo "universe-visual bytes: $(wc -c < src/data/universe_visual.generated.json)"

      - name: Install site dependencies
        run: npm ci
      - name: Build
        run: npm run build

  shipped-coherent:
    name: site build + deploy (shipped-coherent)
    # the deploy path — the wedge: only main pushes, and the transcript must generate from PyPI.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/website/package-lock.json

      - name: Install the SHIPPED package from PyPI (pinned) — the deploy wedge
        run: pip install "columna-core==0.10.0" "columna-server==0.4.0"

      # PROSE-COHERENCE TRIPWIRE (from the #45 incident): the integrity gate guards WIRE, not WORDS.
      # This parse-checks every documented FrameQL block in the corpus + llms files against the INSTALLED
      # shipped package — documented syntax the shipped parser rejects fails the deploy. It fails closed
      # against a package too old to run the documented (envelope) grammar; it goes green once the pin
      # is the version that ships that grammar. Bump the pin above in the same flip that ships 0.9.0.
      - name: Prose-coherence tripwire (corpus + llms parse against the shipped package)
        run: python scripts/check_prose_coherence.py

      - name: Generate the integrity transcript from the SHIPPED package (fails closed)
        run: |
          mkdir -p src/data
          python scripts/gen_transcript.py > src/data/transcript.generated.json
          echo "transcript bytes: $(wc -c < src/data/transcript.generated.json)"

      # The /case seeds need the Cascadia code (logical_spec/physical_map/recapture + the cascadia demo),
      # which ships at the 0.10.0 flip. This step goes green on the deploy path only once the pin above
      # is 0.10.0 — bump it in the same flip that merges the /case section to main (the draft-lock).
      - name: Generate the /case seeds from the SHIPPED package (fails closed on exemplar drift)
        run: |
          python scripts/gen_case.py > src/data/case.generated.json
          echo "case bytes: $(wc -c < src/data/case.generated.json)"

      - name: Generate the Universe Visual (Figure 1) from the SHIPPED package (fails closed)
        run: |
          python scripts/gen_universe_visual.py > src/data/universe_visual.generated.json
          echo "universe-visual bytes: $(wc -c < src/data/universe_visual.generated.json)"

      - name: Install site dependencies
        run: npm ci
      - name: Build
        run: npm run build

      - name: Deploy to Vercel (production, prebuilt)
        if: ${{ env.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
