[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "columna"
version = "0.10.0"
description = "Columna, by datumwise — honest metrics engine. Metapackage: installs columna-core + columna-server."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Datumwise" }]
keywords = ["analytics", "semantic-layer", "duckdb", "polars", "manifold", "frame-ql", "metapackage"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database :: Front-Ends",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "columna-core>=0.10.0",
    "columna-server>=0.4.0",
]

[project.urls]
Homepage = "https://datumwise.ai"
Repository = "https://github.com/datumwise/columna"

[tool.setuptools]
packages = ["columna"]
