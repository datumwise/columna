[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "columna-server"
version = "0.1.0"
description = "Columna MCP server — a library of Manifolds exposed to AI agents over MCP, one contract (the four moods as data)."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{ name = "Datumwise" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "columna-core>=0.7.8",
    "mcp>=1.0",
    "tomli>=2.0; python_version < '3.11'",
    # store.py imports duckdb directly to load the connector's warehouse — declare it explicitly
    # rather than rely on columna-core pulling it transitively (the WP-0 pyarrow lesson).
    "duckdb>=1.0,<2.0",
]

[project.optional-dependencies]
http = ["uvicorn>=0.23", "starlette>=0.37"]
test = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
columna-server = "columna_server.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/columna_server"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 110

[tool.ruff.lint]
select = ["F", "E9"]
