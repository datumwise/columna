[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "columna-server"
version = "0.7.0"
description = "Columna MCP server — a library of Manifolds exposed to AI agents over MCP, one contract (the four moods as data)."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{ name = "Datumwise" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "columna-core>=0.12.0",
    "mcp>=1.0",
    "tomli>=2.0; python_version < '3.11'",
    # store.py imports duckdb directly to load the connector's warehouse — declare it explicitly
    # rather than rely on columna-core pulling it transitively (the WP-0 pyarrow lesson).
    "duckdb>=1.0,<2.0",
]

[project.optional-dependencies]
http = ["uvicorn>=0.23", "starlette>=0.37"]
agent = ["anthropic>=0.40"]
test = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
columna-server = "columna_server.cli:main"

[tool.hatch.build.targets.wheel]
# hatchling includes ALL files under the package dir (not just .py), so the packaged demo data
# (src/columna_server/demo/**: manifold.cml + data.toml + the small bundled warehouse) ships in the
# wheel automatically — no force-include needed. `columna-server demo` therefore runs with no path
# args from a clean-venv wheel install (proven by the py3.10 wheel job in CI).
packages = ["src/columna_server"]

[tool.hatch.build.targets.sdist]
include = ["src", "tests", "demos", "README.md", "CHANGELOG.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "llm: live test that calls a real LLM provider; needs ANTHROPIC_API_KEY, excluded from CI.",
]

[tool.ruff]
line-length = 110

[tool.ruff.lint]
select = ["F", "E9"]
