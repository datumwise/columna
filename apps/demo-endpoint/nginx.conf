# Public face for the read-only demo endpoint. Rate-limited, CORS-scoped, SSE-safe.
worker_processes 1;
events { worker_connections 256; }

http {
  # per-IP rate limit: 60 requests/minute, small burst absorbed without delay -> 429 beyond
  limit_req_zone $binary_remote_addr zone=demo:10m rate=60r/m;
  limit_req_status 429;

  # allow the site origins only (prod + Vercel previews + local dev); echo the matched origin
  map $http_origin $cors_ok {
    default "";
    "~^https://datumwise\.ai$"            $http_origin;
    "~^https://[a-z0-9-]+\.vercel\.app$"  $http_origin;
    "~^http://localhost(:[0-9]+)?$"       $http_origin;
  }

  upstream columna { server 127.0.0.1:8765; keepalive 8; }

  server {
    listen 8080;
    server_name _;

    # CORS (applied on every response, including errors)
    add_header Access-Control-Allow-Origin  $cors_ok always;
    add_header Vary Origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Mcp-Session-Id, Mcp-Protocol-Version, Last-Event-ID" always;
    add_header Access-Control-Expose-Headers "Mcp-Session-Id" always;
    add_header Access-Control-Max-Age 86400 always;

    location = /healthz { return 200 "ok\n"; }

    location / {
      # preflight
      if ($request_method = OPTIONS) { return 204; }

      limit_req zone=demo burst=20 nodelay;

      proxy_pass http://columna;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      # streamable-http / SSE: never buffer, keep the stream open
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      chunked_transfer_encoding on;
    }
  }
}
